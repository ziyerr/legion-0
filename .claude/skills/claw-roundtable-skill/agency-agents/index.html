        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --accent-cyan: #00f0ff;
            --accent-magenta: #ff00aa;
            --accent-purple: #a855f7;
            --accent-green: #00ff88;
            --text-primary: #ffffff;
            --text-secondary: #8b8b9e;
            --border-glow: rgba(0, 240, 255, 0.3);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 背景效果 */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        
        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        
        .bg-glow-1 {
            top: -200px;
            right: -200px;
            background: var(--accent-cyan);
        }
        
        .bg-glow-2 {
            bottom: -200px;
            left: -200px;
            background: var(--accent-magenta);
        }
        
        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        /* 头部 */
        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
            margin-bottom: 16px;
            text-shadow: 0 0 40px rgba(0, 240, 255, 0.5);
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 300;
        }
        
        .count-badge {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 20px;
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.1), rgba(255, 0, 170, 0.1));
            border: 1px solid var(--border-glow);
            border-radius: 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--accent-cyan);
        }
        
        /* 搜索和筛选 */
        .search-box {
            max-width: 600px;
            margin: 0 auto 40px;
            position: relative;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .search-box input {
            width: 100%;
            padding: 18px 24px 18px 56px;
            background: var(--bg-secondary);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .search-box input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
        }
        
        .search-box::before {
            content: "⌕";
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.4rem;
            color: var(--text-secondary);
        }
        
        /* 分类标签 */
        .categories {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 50px;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }
        
        .category-tag {
            padding: 10px 22px;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .category-tag:hover, .category-tag.active {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(168, 85, 247, 0.2));
            border-color: var(--accent-cyan);
            color: var(--text-primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 240, 255, 0.2);
        }
        
        .category-tag .count {
            display: inline-block;
            margin-left: 8px;
            padding: 2px 8px;
            background: rgba(0, 240, 255, 0.2);
            border-radius: 10px;
            font-size: 0.75rem;
            font-family: 'Orbitron', sans-serif;
        }
        
        /* Agent 网格 */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .agent-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out both;
        }
        
        .agent-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-magenta));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }
        
        .agent-card:hover {
            transform: translateY(-5px);
            border-color: var(--border-glow);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .agent-card:hover::before {
            transform: scaleX(1);
        }
        
        .agent-card .name {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        
        .agent-card .desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        
        .agent-card .tag {
            display: inline-block;
            margin-top: 12px;
            padding: 4px 12px;
            background: rgba(0, 240, 255, 0.1);
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--accent-cyan);
        }
        
        /* 分类区块 */
        .category-section {
            margin-bottom: 60px;
        }
        
        .category-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .category-title::before {
            content: "";
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, var(--accent-cyan), var(--accent-magenta));
            border-radius: 2px;
        }
        
        /* 页脚 */
        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 60px;
        }
        
        footer a {
            color: var(--accent-cyan);
            text-decoration: none;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .logo {
                font-size: 2rem;
            }
            
            .categories {
                gap: 8px;
            }
            
            .category-tag {
                padding: 8px 16px;
                font-size: 0.8rem;
            }
            
            .agents-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* 隐藏/显示 */
        .hidden {
            display: none !important;
        }
        
        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }
        
        .loading::after {
            content: "";
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent-cyan);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

        let currentCategory = 'all';
        let searchQuery = '';
        
        function renderAgents() {
            const grid = document.getElementById('agentsGrid');
            const filtered = agentsData.filter(agent => {
                const matchCategory = currentCategory === 'all' || agent.category === currentCategory;
                const matchSearch = searchQuery === '' || 
                    agent.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    agent.desc.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    agent.en.toLowerCase().includes(searchQuery.toLowerCase());
                return matchCategory && matchSearch;
            });
            
            grid.innerHTML = filtered.map((agent, index) => `
                <div class="agent-card" style="animation-delay: ${index * 0.03}s">
                    <div class="name">${agent.name}</div>
                    <div class="desc">${agent.desc}</div>
                    <div class="tag">${agent.en}</div>
                </div>
            `).join('');
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="loading">未找到匹配的智能体</div>';
            }
        }
        
        // 分类点击事件
        document.querySelectorAll('.category-tag').forEach(tag => {
            tag.addEventListener('click', () => {
                document.querySelectorAll('.category-tag').forEach(t => t.classList.remove('active'));
                tag.classList.add('active');
                currentCategory = tag.dataset.category;
                renderAgents();
            });
        });
        
        // 搜索事件
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderAgents();
        });
        
        // 初始渲染
        renderAgents();
    </script>
